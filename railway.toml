[build]
  builder = "dockerfile"

[deploy]
  startCommand = "sh -c 'npx prisma db push --accept-data-loss 2>&1; npm start'"
  healthcheckPath = "/api/auth/csrf"
  healthcheckTimeout = 30
  port = 8080

[[services]]
  name = "leland-mills-assistant"
  run = "sh -c 'npx prisma db push --accept-data-loss 2>&1; npm start'"

  [services.build]
    builder = "dockerfile"