[build]
  builder = "nixpacks"

[deploy]
  startCommand = "npm start"
  healthcheckPath = "/"
  healthcheckTimeout = 30

[[services]]
  name = "leland-mills-assistant"
  run = "npm start"

  [services.build]
    builder = "nixpacks"

  [services.ports]
    port = 3000

  [[services.volumes]]
    mountPath = "/app/prisma"

[[services]]
  name = "postgres"
  type = "postgres"
  image = "postgres:16-alpine"

  [services.build]
    builder = "nixpacks"

  [services.ports]
    port = 5432
